<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harshath Kasim</title>
  <meta name="description" content="Harshath Kasim — personal site. Currently in progress." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #14161c;
      --bg-glow: #1d212c;
      --text: #ecead3;
      --text-soft: #c9c7bd;
      --muted: #7e8089;
      --accent: #c8a56b;
      --line: rgba(236, 234, 211, 0.14);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      background-image: radial-gradient(
        ellipse 70% 55% at 50% 38%,
        var(--bg-glow) 0%,
        var(--bg) 70%
      );
      color: var(--text);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.1s;
    }

    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-weight: 400;
      font-size: clamp(3.2rem, 12vw, 7rem);
      line-height: 1.02;
      letter-spacing: 0.01em;
      color: var(--text);
      opacity: 0;
      animation: rise 1s ease forwards 0.25s;
    }

    h1 .accent {
      font-style: italic;
      color: var(--accent);
    }

    .rule {
      width: 0;
      height: 1px;
      background: var(--line);
      margin: 2rem auto 1.6rem;
      animation: grow 1.1s ease forwards 0.6s;
    }

    .tagline {
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text-soft);
      max-width: 30rem;
      opacity: 0;
      animation: rise 1s ease forwards 0.75s;
    }

    .contact {
      margin-top: 2.4rem;
      opacity: 0;
      animation: rise 1s ease forwards 0.95s;
    }

    .contact a {
      position: relative;
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      padding-bottom: 4px;
    }

    .contact a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .contact a:hover::after,
    .contact a:focus-visible::after { transform: scaleX(1); }

    .contact a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 6px;
      border-radius: 2px;
    }

    footer {
      text-align: center;
      padding: 1.8rem 1.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: rise 1s ease forwards 1.15s;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes grow {
      from { width: 0; }
      to   { width: 3rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .eyebrow, h1, .tagline, .contact, footer { animation: none; opacity: 1; }
      .rule { animation: none; width: 3rem; }
      .contact a::after { transition: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">harshathkasim.com</p>
    <h1>Harshath <span class="accent">Kasim</span></h1>
    <div class="rule" aria-hidden="true"></div>
    <p class="tagline">
      A fuller portfolio is on the way. In the meantime, the door is open —
      reach out any time.
    </p>
    <p class="contact">
      <a href="mailto:hello@harshathkasim.com">hello@harshathkasim.com</a>
    </p>
  </main>

  <footer>
    &copy; 2026 Harshath Kasim
  </footer>
</body>
</html>
